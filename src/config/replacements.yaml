# src/config/replacements.yaml

# SKIRT9 Simulation Parameters

global_wavelength_settings:
    MIN_WAVELENGTH: "0.09 micron"
    MAX_WAVELENGTH: "500 micron"
    NUM_WAVELENGTHS: "150"

global_instrument_angles:
    DISTANCE: "1 kpc"

    INCLINATION_FRONT: "0 deg"
    AZIMUTH_FRONT: "0 deg"

    INCLINATION_TOP: "90 deg"
    AZIMUTH_TOP: "90 deg"

    INCLINATION_SIDE: "90 deg"
    AZIMUTH_SIDE: "0 deg"

    ROLL: "90 deg"
    NUMPIXELSX: "800"
    NUMPIXELSY: "800"

    ZOOM_FOV_FACTOR: "0.25"

simulation_settings:
    USERLEVEL: "Expert"
    SIMULATIONMODE: "DustEmission"
    ITERATE_PRIMARY: "false"
    ITERATE_SECONDARY: "true"
    NUMPACKETS: "1e7"
    RANDOM_SEED: "0"

grid_settings:
    MINLEVEL: "6"
    MAXLEVEL: "12"

medium_settings:
    FORCE_SCATTERING: "true"

radiation_field_settings:
    STORE_RAD_FIELD: "true"

dust_emission_settings:
    # "Stochastic" for transiently heated small grains (PAHs), "Equilibrium" for fast, thermal only
    DUST_EMISSION_TYPE: "Stochastic"
    MAX_ITERATIONS: "40"
    ITERATION_MULTIPLIER: "5"

particle_medium_settings:
    # Typically 0.01 for Milky Way ISM
    DUST_TO_GAS_RATIO: "0.01"
    # Crucial to prevent SKIRT crashing near hot Sink particles
    MAX_DUST_TEMP: "1500 K"

dust_settings:
    # NOTE: Uncomment exactly ONE of the DUST_MIX_CONFIG blocks below

    # Option 1: Draine & Li 2007 (Standard MW)
    # DUST_MIX_CONFIG: '<DraineLiDustMix numSilicateSizes="5" numGraphiteSizes="5" numPAHSizes="5"/>'

    # Option 2: MRN 1997 Dust Mix
    DUST_MIX_CONFIG: '<MRNDustMix numSilicateSizes="5" numGraphiteSizes="5"/>'

    # Option 3: Mean Interstellar Dust Mix
    # DUST_MIX_CONFIG: '<MeanInterstellarDustMix/>'

    # Option 4: Ivezic 1D Benchmark Dust Mix (with mean properties)
    # DUST_MIX_CONFIG:

    # Option 5: Pascucci 2D Benchmark Dust Mix (with mean properties)
    # DUST_MIX_CONFIG:

    # Option 6: Pinte 2D Benchmark Dust Mix (with mean properties)
    # DUST_MIX_CONFIG:

    # Option 7: TRUST Benchmark Dust Mix (with mean properties)
    # DUST_MIX_CONFIG:

    # Option 8: THEMIS (Jones et al. 2017)
    # DUST_MIX_CONFIG: '<ThemisDustMix numSilicateSizes="5" numHydrocarbonSizes="5"/>'

    # Option 9: TRUST Benchmark Dust Mix
    # DUST_MIX_CONFIG:

