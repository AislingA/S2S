apiVersion: batch/v1
kind: Job
metadata:
  name: skirt-batch-job
  namespace: sdsu-rosen-astro-group
spec:
  backoffLimit: 0
  template:
    spec:
      securityContext:
        runAsUser: 1000
        fsGroup: 100

      initContainers:
      - name: volume-mount-hack
        image: busybox
        securityContext:
          runAsUser: 0
        command: ["sh", "-c", "chown 1000:100 /data"]
        resources:
          limits:
            memory: "1Gi"
            cpu: "1"
          requests:
            memory: "1Gi"
            cpu: "1"
        volumeMounts:
        - name: s2s-storage
          mountPath: /data

      # --- MAIN PIPELINE RUNNER ---
      containers:
      - name: skirt-runner
        image: ghcr.io/sdsu-research-ci/astro-notebook@sha256:b790987333dac51a8ea777988bc4bf2b5a09f823819b1419beff51f69075b462
        command: ["/bin/bash", "-c"]
        args:
          - |
            echo "=== STEP 1: INITIALIZING ENVIRONMENT ==="
            export HOME=/home/jovyan
            
            # THE MAGIC KEY: Changed to SKIRT_DATA_PATH
            # !
            export SKIRT_DATA_PATH=/home/jovyan/Resources
            echo "SKIRT_DATA_PATH is successfully set to: $SKIRT_DATA_PATH"
            
            echo "Installing Python dependencies..."
            pip install --quiet --user --no-cache-dir h5py pyyaml

            echo " "
            echo "=== STEP 2: DOWNLOADING RAW SKIRT RESOURCES ==="

            mkdir -p /home/jovyan/resources_Raw
            rclone copy "s3:sdsu-rosen/skirt_resources/" "/home/jovyan/resources_Raw/"
            
            echo " "
            echo "=== STEP 3: MERGING RESOURCES USING PYTHON ==="
            python -c "
            import os, shutil
            raw_dir = '/home/jovyan/resources_Raw'
            dest_dir = '/home/jovyan/resources'
            os.makedirs(dest_dir, exist_ok=True)
            for pack in os.listdir(raw_dir):
                pack_path = os.path.join(raw_dir, pack)
                if os.path.isdir(pack_path):
                    for category in os.listdir(pack_path):
                        cat_path = os.path.join(pack_path, category)
                        if os.path.isdir(cat_path):
                            shutil.copytree(cat_path, os.path.join(dest_dir, category), dirs_exist_ok=True)
            print('Python merge completed successfully!')
            "
            
            echo " "
            echo "=== STEP 4: ROUTING RESOURCES TO SKIRT ==="

            mkdir -p /home/jovyan/SKIRT
            ln -s /home/jovyan/resources /home/jovyan/SKIRT/resources
            
            echo "Cloning repositories..."
            git clone https://github.com/SKIRT/PTS9.git /home/jovyan/PTS9
            git clone https://github.com/AislingA/S2S.git /home/jovyan/S2S
            

            ln -s /home/jovyan/resources /home/jovyan/S2S/resources
            
            cd /home/jovyan/S2S
            export PYTHONPATH=$PYTHONPATH:/home/jovyan/S2S/src:/home/jovyan

            echo " "
            echo "=== STEP 5: PREPARING SNAPSHOT 150 ==="
            SNAPSHOTS=(150)

            for snap in "${SNAPSHOTS[@]}"; do
              OUT_DIR="/data/outputs/snapshot_${snap}"
              LOCAL_HDF5="/data/inputs/snapshot_${snap}.hdf5"

              rm -rf "${OUT_DIR}"
              mkdir -p "${OUT_DIR}"
              mkdir -p "/data/inputs"
              

              ln -s /home/jovyan/resources "${OUT_DIR}/resources"

              echo "Downloading snapshot_${snap}.hdf5 from S3..."
              rclone copy "s3:sdsu-rosen/snapshot_${snap}.hdf5" "/data/inputs/"
              
              echo " "
              echo "=== STEP 6: EXECUTING S2S PIPELINE & SKIRT ==="
              python src/runner/run_sim.py \
                --input "${LOCAL_HDF5}" \
                --output-dir "${OUT_DIR}"

              echo " "
              echo "=== STEP 7: UPLOADING TO S3 & CLEANUP ==="

              rm "${OUT_DIR}/resources"
              
              echo "Uploading mock observations to S3..."
              rclone copy "${OUT_DIR}/" "s3:sdsu-rosen/skirt_outputs/snapshot_${snap}/"
              
              rm "${LOCAL_HDF5}"
              echo "Completed processing for snapshot_${snap}."
            done

            echo " "
            echo "All tasks finished! The batch job will now exit gracefully."

        resources:
          limits:
            memory: "128Gi"
            cpu: "16"
          requests:
            memory: "128Gi"
            cpu: "16"

        volumeMounts:
        - name: s2s-storage
          mountPath: /data
        - name: rclone-config-volume
          mountPath: /home/jovyan/.config/rclone
        - name: skirt-resources
          mountPath: /opt/SKIRT/resources

      restartPolicy: Never

      volumes:
      - name: s2s-storage
        persistentVolumeClaim:
          claimName: s2s
      - name: rclone-config-volume
        secret:
          secretName: rclone-config
      - name: skirt-resources
        persistentVolumeClaim:
          claimName: skirt-resources